server:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

database:
  embedded: true

openbao:
  embedded: true

ingress:
  enabled: false

autoscaling:
  enabled: false

observability:
  enabled: false

daemon:
  enabled: true
  maxConcurrentSessions: 1
