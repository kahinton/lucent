{{- if .Values.database.embedded }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ printf "%s-db" (include "lucent.fullname" .) }}
  labels:
    {{- include "lucent.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  serviceName: {{ printf "%s-db" (include "lucent.fullname" .) }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "lucent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        {{- include "lucent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-permissions
          image: {{ printf "%s:%s" .Values.database.image.repository .Values.database.image.tag | quote }}
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          command: ["sh", "-c", "mkdir -p /var/lib/postgresql/data/pgdata"]
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: {{ printf "%s:%s" .Values.database.image.repository .Values.database.image.tag | quote }}
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop: ["ALL"]
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-secrets" (include "lucent.fullname" .) }}
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-secrets" (include "lucent.fullname" .) }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-secrets" (include "lucent.fullname" .) }}
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            periodSeconds: {{ dig "database" "health" "livenessPeriodSeconds" 10 .Values }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            periodSeconds: {{ dig "database" "health" "readinessPeriodSeconds" 10 .Values }}
          {{- with .Values.database.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "lucent.labels" . | nindent 10 }}
          app.kubernetes.io/component: db
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.database.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.persistence.size }}
{{- end }}
