{{- if and .Values.ollama.enabled (eq .Values.ollama.mode "daemonset") }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ printf "%s-ollama" (include "lucent.fullname" .) }}
  labels:
    {{- include "lucent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  selector:
    matchLabels:
      {{- include "lucent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        {{- include "lucent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ollama
          image: {{ printf "%s:%s" .Values.ollama.image.repository .Values.ollama.image.tag | quote }}
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          resources:
            requests:
              cpu: {{ dig "ollama" "resources" "requests" "cpu" "250m" .Values }}
              memory: {{ dig "ollama" "resources" "requests" "memory" "1Gi" .Values }}
              {{- if .Values.ollama.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count }}
              {{- end }}
            limits:
              cpu: {{ dig "ollama" "resources" "limits" "cpu" "2000m" .Values }}
              memory: {{ dig "ollama" "resources" "limits" "memory" "8Gi" .Values }}
              {{- if .Values.ollama.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count }}
              {{- end }}
      {{- with .Values.ollama.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
