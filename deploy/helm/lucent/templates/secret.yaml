{{- $externalSecretsUsed := or .Values.database.external.secretRef .Values.llm.providers.anthropic.secretRef .Values.llm.providers.openai.secretRef .Values.llm.providers.google.secretRef .Values.openbao.external.secretRef -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-secrets" (include "lucent.fullname" .) }}
  labels:
    {{- include "lucent.labels" . | nindent 4 }}
  annotations:
    {{- if $externalSecretsUsed }}
    argocd.argoproj.io/sync-options: Skip=true
    {{- end }}
    lucent.io/external-secrets-used: {{ ternary "true" "false" $externalSecretsUsed | quote }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgresql.auth.database | quote }}
  POSTGRES_USER: {{ .Values.postgresql.auth.username | quote }}
  POSTGRES_PASSWORD: {{ required ".Values.postgresql.auth.password is required" .Values.postgresql.auth.password | quote }}
  DATABASE_URL: {{ default (printf "postgresql://%s:%s@%s-db:5432/%s" .Values.postgresql.auth.username (required ".Values.postgresql.auth.password is required" .Values.postgresql.auth.password) (include "lucent.fullname" .) .Values.postgresql.auth.database) .Values.server.env.DATABASE_URL | quote }}
  GITHUB_TOKEN: {{ default "" .Values.server.env.GITHUB_TOKEN | quote }}
  ANTHROPIC_API_KEY: {{ default "" .Values.server.env.ANTHROPIC_API_KEY | quote }}
  OPENAI_API_KEY: {{ default "" .Values.server.env.OPENAI_API_KEY | quote }}
  GOOGLE_API_KEY: {{ default "" .Values.server.env.GOOGLE_API_KEY | quote }}
  LUCENT_SECRET_KEY: {{ default "" .Values.server.env.LUCENT_SECRET_KEY | quote }}
  VAULT_TOKEN: {{ default "" .Values.server.env.VAULT_TOKEN | quote }}
