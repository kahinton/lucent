{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "lucent.fullname" . }}
  labels:
    {{- include "lucent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lucent.fullname" . }}
  labels:
    {{- include "lucent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "lucent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "lucent.fullname" . }}
{{- end }}
