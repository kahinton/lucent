apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-server" (include "lucent.fullname" .) }}
  labels:
    {{- include "lucent.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "lucent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
---
{{- if .Values.database.embedded }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-db" (include "lucent.fullname" .) }}
  labels:
    {{- include "lucent.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "lucent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: db
---
{{- end }}
{{- if .Values.openbao.embedded }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-openbao" (include "lucent.fullname" .) }}
  labels:
    {{- include "lucent.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8200
      targetPort: http
      protocol: TCP
  selector:
    {{- include "lucent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: openbao
{{- end }}
