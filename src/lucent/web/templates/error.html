{% extends "base.html" %}

{% block title %}{{ status_code }} — Lucent{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-20">
    <div class="text-center max-w-md">
        <p class="text-6xl font-bold text-primary-500 dark:text-primary-400">{{ status_code }}</p>
        <h1 class="mt-4 text-2xl font-semibold text-gray-900 dark:text-white">{{ title }}</h1>
        <p class="mt-2 text-gray-600 dark:text-gray-400">{{ detail }}</p>
        <div class="mt-8">
            <a href="/" class="inline-flex items-center gap-2 rounded-lg bg-primary-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
                Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
