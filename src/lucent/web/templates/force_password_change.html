<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Change Password - Lucent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @media (prefers-color-scheme: dark) {
            input { background-color: #1a2233 !important; color: #e2e8f0 !important; border-color: #334155 !important; }
            input::placeholder { color: #4b5e78 !important; }
            input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2) !important; }
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-950 flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="flex flex-col items-center mb-8">
            <img src="/static/lucent_logo_128.png" alt="Lucent" class="h-16 mb-4">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Lucent</h1>
        </div>

        <div class="bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-gray-200 dark:border-gray-800 p-8">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100 mb-2">Password Change Required</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Your password has been reset by an administrator. Please set a new password to continue.</p>

            {% if error %}
            <div class="mb-4 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 rounded-lg text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/force-password-change" class="space-y-4">
                <input type="hidden" name="{{ csrf_field_name }}" value="{{ csrf_token }}">
                <div>
                    <label for="new_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                        New Password
                    </label>
                    <input
                        type="password"
                        id="new_password"
                        name="new_password"
                        placeholder="Enter new password"
                        required
                        minlength="8"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                    >
                </div>
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                        Confirm Password
                    </label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Confirm new password"
                        required
                        minlength="8"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                    >
                </div>
                <p class="text-xs text-gray-400 dark:text-gray-500">
                    Must be at least 8 characters with uppercase, lowercase, and a digit.
                </p>
                <button type="submit" class="w-full py-2.5 px-4 bg-primary-600 text-white font-medium text-sm rounded-lg hover:bg-primary-700 transition-colors">
                    Set New Password
                </button>
            </form>
        </div>
    </div>
</body>
</html>
