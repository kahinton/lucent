{% extends "base.html" %}

{% block title %}New Task - Lucent{% endblock %}

{% block content %}
<!-- Breadcrumb -->
<nav class="mb-6">
    <a href="/daemon/tasks" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-gray-700 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
        Back to Tasks
    </a>
</nav>

<!-- Page Header -->
<div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Submit New Task</h1>
    <p class="mt-1 text-sm text-gray-500">Create a task for the daemon to process autonomously</p>
</div>

<!-- Form -->
<div class="bg-white rounded-xl border border-gray-200 shadow-sm">
    <form method="post" action="/daemon/tasks/new" class="divide-y divide-gray-100" id="task-form">
        <div class="p-6 space-y-6">
            <!-- Description -->
            <div>
                <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Task Description</label>
                <textarea 
                    id="description" 
                    name="description" 
                    rows="5" 
                    required
                    placeholder="Describe what you want the daemon to do..."
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-shadow resize-y"
                ></textarea>
            </div>

            <!-- Agent Type & Priority -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Agent Type -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">Agent Type</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="agent_type" value="code" class="peer sr-only" checked>
                            <div class="p-3 rounded-lg border-2 border-gray-200 hover:border-indigo-300 peer-checked:border-indigo-500 peer-checked:bg-indigo-50 transition-all text-center">
                                <p class="text-sm font-medium text-gray-900">Code</p>
                                <p class="text-xs text-gray-500">Bug fixes, features</p>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="agent_type" value="research" class="peer sr-only">
                            <div class="p-3 rounded-lg border-2 border-gray-200 hover:border-blue-300 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all text-center">
                                <p class="text-sm font-medium text-gray-900">Research</p>
                                <p class="text-xs text-gray-500">Investigation, analysis</p>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="agent_type" value="documentation" class="peer sr-only">
                            <div class="p-3 rounded-lg border-2 border-gray-200 hover:border-emerald-300 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 transition-all text-center">
                                <p class="text-sm font-medium text-gray-900">Documentation</p>
                                <p class="text-xs text-gray-500">Docs, guides</p>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="agent_type" value="memory" class="peer sr-only">
                            <div class="p-3 rounded-lg border-2 border-gray-200 hover:border-purple-300 peer-checked:border-purple-500 peer-checked:bg-purple-50 transition-all text-center">
                                <p class="text-sm font-medium text-gray-900">Memory</p>
                                <p class="text-xs text-gray-500">Consolidation, cleanup</p>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="agent_type" value="reflection" class="peer sr-only">
                            <div class="p-3 rounded-lg border-2 border-gray-200 hover:border-amber-300 peer-checked:border-amber-500 peer-checked:bg-amber-50 transition-all text-center">
                                <p class="text-sm font-medium text-gray-900">Reflection</p>
                                <p class="text-xs text-gray-500">Self-analysis</p>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="agent_type" value="planning" class="peer sr-only">
                            <div class="p-3 rounded-lg border-2 border-gray-200 hover:border-pink-300 peer-checked:border-pink-500 peer-checked:bg-pink-50 transition-all text-center">
                                <p class="text-sm font-medium text-gray-900">Planning</p>
                                <p class="text-xs text-gray-500">Strategy, roadmap</p>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Priority -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">Priority</label>
                    <div class="space-y-2">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="priority" value="high" class="peer sr-only">
                            <div class="p-3 rounded-lg border-2 border-gray-200 hover:border-red-300 peer-checked:border-red-500 peer-checked:bg-red-50 transition-all flex items-center gap-3">
                                <span class="w-3 h-3 rounded-full bg-red-500"></span>
                                <div>
                                    <p class="text-sm font-medium text-gray-900">High</p>
                                    <p class="text-xs text-gray-500">Process urgently, next cycle</p>
                                </div>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="priority" value="medium" class="peer sr-only" checked>
                            <div class="p-3 rounded-lg border-2 border-gray-200 hover:border-amber-300 peer-checked:border-amber-500 peer-checked:bg-amber-50 transition-all flex items-center gap-3">
                                <span class="w-3 h-3 rounded-full bg-amber-500"></span>
                                <div>
                                    <p class="text-sm font-medium text-gray-900">Medium</p>
                                    <p class="text-xs text-gray-500">Standard processing order</p>
                                </div>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="priority" value="low" class="peer sr-only">
                            <div class="p-3 rounded-lg border-2 border-gray-200 hover:border-gray-300 peer-checked:border-gray-400 peer-checked:bg-gray-50 transition-all flex items-center gap-3">
                                <span class="w-3 h-3 rounded-full bg-gray-400"></span>
                                <div>
                                    <p class="text-sm font-medium text-gray-900">Low</p>
                                    <p class="text-xs text-gray-500">Process when idle</p>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Context (optional) -->
            <div>
                <label for="context" class="block text-sm font-medium text-gray-700 mb-2">Additional Context <span class="text-gray-400 font-normal">(optional)</span></label>
                <textarea 
                    id="context" 
                    name="context" 
                    rows="3" 
                    placeholder="Any extra context, references, or constraints..."
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-shadow resize-y"
                ></textarea>
            </div>

            <!-- Tags -->
            <div>
                <label for="tags" class="block text-sm font-medium text-gray-700 mb-2">Tags <span class="text-gray-400 font-normal">(optional)</span></label>
                <input 
                    type="text" 
                    id="tags" 
                    name="tags" 
                    placeholder="tag1, tag2, tag3"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-shadow"
                >
                <p class="mt-1.5 text-xs text-gray-500">Separate tags with commas</p>
            </div>
        </div>

        <!-- Actions -->
        <div class="px-6 py-4 bg-gray-50 flex items-center justify-end gap-3">
            <a href="/daemon/tasks" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                Cancel
            </a>
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-primary-600 rounded-lg hover:bg-primary-700 transition-colors shadow-sm">
                Submit Task
            </button>
        </div>
    </form>
</div>
{% endblock %}
