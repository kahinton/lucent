<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Login - Lucent</title>
    <script src="/static/vendor/tailwindcss-3.4.17.js"></script>
    <script nonce="{{ request.state.csp_nonce }}">
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#e6fffb', 100: '#bffaf2', 200: '#7feee4', 300: '#3ee0d6',
                            400: '#00d4c7', 500: '#00b8ad', 600: '#00968f', 700: '#08766f',
                            800: '#0b5d59', 900: '#0d4846', 950: '#072b2a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --login-black: #080808;
            --login-panel: rgba(18, 18, 18, 0.78);
            --login-line: rgba(255, 255, 255, 0.15);
            --login-text: #faf9f6;
            --login-muted: #9d9995;
            --login-teal: #00cfc1;
            --login-pink: #ff3f9b;
            --login-yellow: #ffd84d;
        }
        html { background: var(--login-black); }
        body {
            position: relative;
            overflow: hidden;
            padding: 2rem 1rem;
            color: var(--login-text);
            background-color: var(--login-black) !important;
            background-image: repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0, rgba(255, 255, 255, 0.018) 1px, transparent 1px, transparent 12px);
        }
        body::before,
        body::after {
            content: '';
            position: fixed;
            pointer-events: none;
        }
        body::before {
            inset: 0 auto 0 0;
            width: 6px;
            background: var(--login-teal);
            box-shadow: 6px 0 var(--login-pink), 12px 0 var(--login-yellow);
        }
        body::after {
            right: 0;
            bottom: 0;
            width: min(34vw, 28rem);
            height: 5px;
            background: var(--login-pink);
            box-shadow: 0 -5px var(--login-yellow), 0 -10px var(--login-teal);
        }
        .login-shell { position: relative; z-index: 1; }
        .login-logo { filter: drop-shadow(0 8px 16px rgba(255, 63, 155, 0.2)); }
        .login-card {
            position: relative;
            overflow: hidden;
            background: var(--login-panel) !important;
            border-color: var(--login-line) !important;
            border-radius: 0.5rem;
            box-shadow: inset 0 1px rgba(255, 255, 255, 0.08), 0 6px 0 #000, 0 24px 60px rgba(0, 0, 0, 0.46);
            backdrop-filter: blur(22px) saturate(135%);
            -webkit-backdrop-filter: blur(22px) saturate(135%);
        }
        .login-card::before {
            content: '';
            position: absolute;
            inset: 0 0 auto;
            height: 3px;
            background: var(--login-pink);
            box-shadow: 33.333% 0 var(--login-yellow), 66.666% 0 var(--login-teal);
        }
        .login-title, .login-heading { color: var(--login-text) !important; }
        .login-subtitle, .login-label { color: var(--login-muted) !important; }
        .login-warning {
            color: #fff0a8 !important;
            background: rgba(255, 216, 77, 0.1) !important;
            border-color: rgba(255, 216, 77, 0.38) !important;
        }
        input {
            background-color: rgba(5, 5, 5, 0.72) !important;
            color: var(--login-text) !important;
            border-color: #424242 !important;
            border-radius: 0.4rem !important;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.55);
        }
        input::placeholder { color: #706d6a !important; }
        input:focus {
            border-color: var(--login-teal) !important;
            box-shadow: 0 0 0 3px rgba(0, 207, 193, 0.16), inset 0 1px 4px rgba(0, 0, 0, 0.55) !important;
        }
        .login-submit {
            color: #050505 !important;
            background: var(--login-pink) !important;
            border-radius: 0.4rem;
            box-shadow: 0 4px 0 #971950, 0 10px 22px rgba(255, 63, 155, 0.2);
        }
        .login-submit:hover { background: #ff5baa !important; transform: translateY(-1px); }
        .login-submit:active { transform: translateY(2px); box-shadow: 0 1px 0 #971950; }
        @media (max-width: 480px) {
            body { align-items: flex-start !important; padding-top: max(2rem, env(safe-area-inset-top)); overflow-y: auto; }
            body::before, body::after { display: none; }
            .login-card { padding: 1.5rem !important; }
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: var(--login-black) !important; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="login-shell w-full max-w-md">
        <div class="flex flex-col items-center mb-8">
            <img src="/static/lucent_logo_128.png" alt="Lucent" class="login-logo h-16 mb-4">
            <h1 class="login-title text-2xl font-bold">Lucent</h1>
            <p class="login-subtitle text-sm mt-1">AI Teammate</p>
        </div>

        <div class="login-card border p-8">
            <h2 class="login-heading text-lg font-semibold mb-6">Sign In</h2>

            {% if error %}
            <div class="mb-4 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 rounded-lg text-sm">
                {{ error }}
            </div>
            {% endif %}

            {% if session_warning %}
            <div class="login-warning mb-4 p-3 border rounded-lg text-xs">
                {{ session_warning }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <input type="hidden" name="{{ csrf_field_name }}" value="{{ csrf_token }}">
                {% for field in fields %}
                <div>
                    <label for="{{ field.name }}" class="login-label block text-sm font-medium mb-1">
                        {{ field.label }}
                    </label>
                    <input
                        type="{{ field.type }}"
                        id="{{ field.name }}"
                        name="{{ field.name }}"
                        placeholder="{{ field.placeholder }}"
                        required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                    >
                </div>
                {% endfor %}

                <button type="submit" class="login-submit w-full py-2.5 px-4 font-semibold text-sm transition-all">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
