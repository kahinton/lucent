services:
  postgres:
    image: postgres:16-alpine
    container_name: mnememcp-db
    environment:
      POSTGRES_DB: mnememcp
      POSTGRES_USER: mnememcp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mnememcp_dev_password}
    volumes:
      - mnememcp_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnememcp -d mnememcp"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mnememcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mnememcp-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mnememcp:${POSTGRES_PASSWORD:-mnememcp_dev_password}@postgres:5432/mnememcp
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  mnememcp_data:
    driver: local
