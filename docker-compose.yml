# ===========================================================================
# LOCAL DEVELOPMENT ONLY — NOT FOR PRODUCTION USE
#
# This file uses insecure defaults suitable only for local development.
# For production deployments, use docker-compose.prod.yml which:
#   - Requires explicit credentials (no defaults)
#   - Uses docker-socket-proxy instead of direct Docker socket mount
#   - Runs OpenBao in production mode with persistent storage
#   - Pins base images with SHA256 digests
#
# See docs/deployment-guide.md for production deployment guidance.
# ===========================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: lucent-db
    environment:
      POSTGRES_DB: lucent
      POSTGRES_USER: lucent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-insecure-dev-password}
    volumes:
      - lucent_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${LUCENT_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucent -d lucent"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  openbao:
    image: openbao/openbao:2.1.0
    container_name: lucent-openbao
    # File-backed storage so the transit encryption key (and therefore all
    # stored credentials) survives container restarts. Previously this ran in
    # `-dev` mode which is memory-only; restarting OpenBao silently wiped the
    # transit key and made every encrypted credential un-decryptable.
    #
    # The image's docker-entrypoint.sh auto-passes `-config=/openbao/config`
    # when the first arg is `server`, so we just need to put our config file
    # in that directory; don't pass `-config=` ourselves (would double-load).
    command: server
    volumes:
      - ./docker/openbao-dev-config.hcl:/openbao/config/config.hcl:ro
      - openbao_data:/openbao/file
      - ./.openbao/shared:/shared
    cap_add:
      - IPC_LOCK
    healthcheck:
      # Accept sealed (503) and uninitialized (501) as "reachable" — the
      # openbao-init container handles initialization and unseal.
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  openbao-init:
    image: curlimages/curl:8.11.1
    container_name: lucent-openbao-init
    depends_on:
      openbao:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://openbao:8200
    volumes:
      - ./docker/openbao-init.sh:/init.sh:ro
      - ./.openbao/shared:/shared
    entrypoint: ["/bin/sh", "/init.sh"]
    restart: "no"

  # Docker socket proxy — mediates Docker API access for sandbox management.
  # SECURITY: Exposing /var/run/docker.sock directly to app containers enables
  # container escape primitives if the app is compromised. This proxy narrows
  # the API surface to endpoints required for sandbox lifecycle operations.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    container_name: lucent-docker-proxy
    environment:
      # Deny by omission; enable only required API groups.
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      POST: 1
      EXEC: 1             # Required for sandbox setup (clone, install, etc.)
      # Explicitly disabled high-risk capabilities.
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Note: read_only was attempted but the tecnativa image writes its haproxy
    # config at runtime from a template in the same directory, which conflicts
    # with read-only filesystems. Security is enforced via the restricted
    # environment variables above (only specific API endpoints exposed) plus
    # the socket being mounted read-only.
    restart: unless-stopped

  lucent:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lucent-server
    depends_on:
      postgres:
        condition: service_healthy
      openbao:
        condition: service_healthy
      openbao-init:
        condition: service_completed_successfully
      docker-socket-proxy:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://lucent:${POSTGRES_PASSWORD:-change-me-insecure-dev-password}@postgres:5432/lucent
      # Restricted DB connection for daemon API key provisioning only.
      # Uses lucent_daemon role with least-privilege grants (see migration 017).
      DAEMON_DATABASE_URL: postgresql://lucent_daemon:${DAEMON_DB_PASSWORD:-change-me-insecure-daemon-password}@postgres:5432/lucent
      LUCENT_MODE: ${LUCENT_MODE:-personal}
      LUCENT_LICENSE_KEY: ${LUCENT_LICENSE_KEY:-}
      # Cookie signing — set a stable value for session persistence across container restarts.
      # Without this, sessions are lost every restart. Generate: openssl rand -base64 32
      LUCENT_SIGNING_SECRET: ${LUCENT_SIGNING_SECRET:-lucent-dev-signing-secret-change-in-production}
      LUCENT_AUTO_APPROVE: ${LUCENT_AUTO_APPROVE:-false}
      LUCENT_SKIP_POST_REVIEW: ${LUCENT_SKIP_POST_REVIEW:-false}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LUCENT_DEFAULT_MODEL: ${LUCENT_DEFAULT_MODEL:-}
      LUCENT_CHAT_MODEL: ${LUCENT_CHAT_MODEL:-}
      LUCENT_MCP_URL_ALLOWLIST: ${LUCENT_MCP_URL_ALLOWLIST:-}
      # LLM Engine: "copilot" (default, uses GitHub Copilot SDK) or "langchain"
      LUCENT_LLM_ENGINE: ${LUCENT_LLM_ENGINE:-copilot}
      # Provider API keys (only needed when LUCENT_LLM_ENGINE=langchain)
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # OpenTelemetry (enable with: OTEL_ENABLED=true)
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-lucent}
      # Secret storage (builtin provider requires an encryption key)
      LUCENT_SECRET_PROVIDER: ${LUCENT_SECRET_PROVIDER:-builtin}
      LUCENT_SECRET_KEY: ${LUCENT_SECRET_KEY:-lucent-dev-secret-key-change-in-production}
      # Credential encryption — uses Vault transit (no local key management needed).
      # OpenBao / Vault connectivity.
      # The root token is generated by openbao-init on first boot and written
      # to the shared volume; VAULT_TOKEN_FILE tells the backend where to read it.
      VAULT_ADDR: http://openbao:8200
      VAULT_TOKEN_FILE: /shared/vault-token
      # Sandbox Docker API access is routed through docker-socket-proxy.
      # SECURITY: This avoids mounting docker.sock directly into the app container.
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      # Ollama (local models) — host.docker.internal points to host machine
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/app/src:cached
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./.github/skills:/app/.github/skills:ro
      - ./.github/agents/definitions:/app/.github/agents/definitions:ro
      - ./.github/sandbox-templates:/app/.github/sandbox-templates:ro
      - ./.openbao/shared:/shared:ro
    ports:
      - "${LUCENT_PORT:-8766}:8766"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    # stdin_open and tty are disabled by default for security.
    # Enable in docker-compose.override.yml for local development debugging.
    restart: unless-stopped

  # --- Observability stack (use with: docker compose --profile observability up -d) ---

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: lucent-otel-collector
    profiles: ["observability"]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"   # OTLP gRPC
      - "${OTEL_HTTP_PORT:-4318}:4318"    # OTLP HTTP
      - "8889:8889"                        # Prometheus exporter
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: lucent-prometheus
    profiles: ["observability"]
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: lucent-jaeger
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"  # Jaeger UI
      - "4317"                             # OTLP gRPC (internal only)
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: lucent-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-lucent}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  # Multi-instance daemon example (use with: docker compose --profile multi-daemon up)
  daemon-1:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: ["multi-daemon"]
    depends_on:
      lucent:
        condition: service_healthy
    environment:
      LUCENT_MCP_URL: http://lucent:8766/mcp
      LUCENT_MCP_API_KEY: ${LUCENT_MCP_API_KEY:-}
      LUCENT_DEFAULT_MODEL: ${LUCENT_DEFAULT_MODEL:-}
      LUCENT_DAEMON_INTERVAL: ${LUCENT_DAEMON_INTERVAL:-15}
      LUCENT_DAEMON_MODEL: ${LUCENT_DAEMON_MODEL:-}
      LUCENT_MCP_URL_ALLOWLIST: ${LUCENT_MCP_URL_ALLOWLIST:-}
      LUCENT_LLM_ENGINE: ${LUCENT_LLM_ENGINE:-copilot}
      LUCENT_MAX_SESSIONS: ${LUCENT_MAX_SESSIONS:-3}
      LUCENT_STALE_HEARTBEAT_MINUTES: ${LUCENT_STALE_HEARTBEAT_MINUTES:-30}
      # Restricted DB connection for API key provisioning only.
      # Uses lucent_daemon role with least-privilege grants (see migration 017).
      DAEMON_DATABASE_URL: postgresql://lucent_daemon:${DAEMON_DB_PASSWORD:-change-me-insecure-daemon-password}@postgres:5432/lucent
    volumes:
      - ./daemon:/app/daemon:cached
      - ./src:/app/src:cached
    command: ["python", "-m", "daemon.daemon"]
    restart: unless-stopped

  daemon-2:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: ["multi-daemon"]
    depends_on:
      lucent:
        condition: service_healthy
    environment:
      LUCENT_MCP_URL: http://lucent:8766/mcp
      LUCENT_MCP_API_KEY: ${LUCENT_MCP_API_KEY:-}
      LUCENT_DEFAULT_MODEL: ${LUCENT_DEFAULT_MODEL:-}
      LUCENT_DAEMON_INTERVAL: ${LUCENT_DAEMON_INTERVAL:-15}
      LUCENT_DAEMON_MODEL: ${LUCENT_DAEMON_MODEL:-}
      LUCENT_MCP_URL_ALLOWLIST: ${LUCENT_MCP_URL_ALLOWLIST:-}
      LUCENT_MAX_SESSIONS: ${LUCENT_MAX_SESSIONS:-3}
      LUCENT_STALE_HEARTBEAT_MINUTES: ${LUCENT_STALE_HEARTBEAT_MINUTES:-30}
      DAEMON_DATABASE_URL: postgresql://lucent_daemon:${DAEMON_DB_PASSWORD:-change-me-insecure-daemon-password}@postgres:5432/lucent
    volumes:
      - ./daemon:/app/daemon:cached
      - ./src:/app/src:cached
    command: ["python", "-m", "daemon.daemon"]
    restart: unless-stopped

volumes:
  lucent_data:
    driver: local
  openbao_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
