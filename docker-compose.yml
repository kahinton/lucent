services:
  postgres:
    image: postgres:16-alpine
    container_name: lucent-db
    environment:
      POSTGRES_DB: lucent
      POSTGRES_USER: lucent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lucent_dev_password}
    volumes:
      - lucent_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${LUCENT_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucent -d lucent"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  lucent:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lucent-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lucent:${POSTGRES_PASSWORD:-lucent_dev_password}@postgres:5432/lucent
      LUCENT_MODE: ${LUCENT_MODE:-personal}
      LUCENT_LICENSE_KEY: ${LUCENT_LICENSE_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LUCENT_CHAT_MODEL: ${LUCENT_CHAT_MODEL:-claude-opus-4.6}
      # LLM Engine: "copilot" (default, uses GitHub Copilot SDK) or "langchain"
      LUCENT_LLM_ENGINE: ${LUCENT_LLM_ENGINE:-copilot}
      # Provider API keys (only needed when LUCENT_LLM_ENGINE=langchain)
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # OpenTelemetry (enable with: OTEL_ENABLED=true)
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-lucent}
      # Secret storage (builtin provider requires an encryption key)
      LUCENT_SECRET_PROVIDER: ${LUCENT_SECRET_PROVIDER:-builtin}
      LUCENT_SECRET_KEY: ${LUCENT_SECRET_KEY:-lucent-dev-secret-key-change-in-production}
    volumes:
      - ./src:/app/src:cached
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./.github/skills:/app/.github/skills:ro
      - ./.github/agents/definitions:/app/.github/agents/definitions:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${LUCENT_PORT:-8766}:8766"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    stdin_open: true
    tty: true
    restart: unless-stopped

  # --- Observability stack (use with: docker compose --profile observability up -d) ---

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: lucent-otel-collector
    profiles: ["observability"]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"   # OTLP gRPC
      - "${OTEL_HTTP_PORT:-4318}:4318"    # OTLP HTTP
      - "8889:8889"                        # Prometheus exporter
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: lucent-prometheus
    profiles: ["observability"]
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: lucent-jaeger
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"  # Jaeger UI
      - "4317"                             # OTLP gRPC (internal only)
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: lucent-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-lucent}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  # Multi-instance daemon example (use with: docker compose --profile multi-daemon up)
  daemon-1:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: ["multi-daemon"]
    depends_on:
      lucent:
        condition: service_healthy
    environment:
      LUCENT_MCP_URL: http://lucent:8766/mcp
      LUCENT_MCP_API_KEY: ${LUCENT_MCP_API_KEY:-}
      LUCENT_DAEMON_INTERVAL: ${LUCENT_DAEMON_INTERVAL:-15}
      LUCENT_DAEMON_MODEL: ${LUCENT_DAEMON_MODEL:-claude-opus-4.6}
      LUCENT_LLM_ENGINE: ${LUCENT_LLM_ENGINE:-copilot}
      LUCENT_MAX_SESSIONS: ${LUCENT_MAX_SESSIONS:-3}
      LUCENT_STALE_HEARTBEAT_MINUTES: ${LUCENT_STALE_HEARTBEAT_MINUTES:-30}
      # Restricted DB connection for API key provisioning only.
      # Uses lucent_daemon role with least-privilege grants (see migration 017).
      DAEMON_DATABASE_URL: postgresql://lucent_daemon:${DAEMON_DB_PASSWORD:-lucent_daemon_dev_password}@postgres:5432/lucent
    volumes:
      - ./daemon:/app/daemon:cached
      - ./src:/app/src:cached
    command: ["python", "-m", "daemon.daemon"]
    restart: unless-stopped

  daemon-2:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: ["multi-daemon"]
    depends_on:
      lucent:
        condition: service_healthy
    environment:
      LUCENT_MCP_URL: http://lucent:8766/mcp
      LUCENT_MCP_API_KEY: ${LUCENT_MCP_API_KEY:-}
      LUCENT_DAEMON_INTERVAL: ${LUCENT_DAEMON_INTERVAL:-15}
      LUCENT_DAEMON_MODEL: ${LUCENT_DAEMON_MODEL:-claude-opus-4.6}
      LUCENT_MAX_SESSIONS: ${LUCENT_MAX_SESSIONS:-3}
      LUCENT_STALE_HEARTBEAT_MINUTES: ${LUCENT_STALE_HEARTBEAT_MINUTES:-30}
      DAEMON_DATABASE_URL: postgresql://lucent_daemon:${DAEMON_DB_PASSWORD:-lucent_daemon_dev_password}@postgres:5432/lucent
    volumes:
      - ./daemon:/app/daemon:cached
      - ./src:/app/src:cached
    command: ["python", "-m", "daemon.daemon"]
    restart: unless-stopped

volumes:
  lucent_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
